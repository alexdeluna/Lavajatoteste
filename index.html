<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lava Jato ERP</title>
<link rel="stylesheet" href="visual.css">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
<h1>Lava Jato ERP</h1>
</header>

<main>

<!-- MENU INICIAL -->
<section id="menu">
<button class="botaoGrande" onclick="abrirTela('novaLavagem')">Registrar Nova Lavagem</button>
<button class="botaoGrande" onclick="abrirTela('consultar')">Consultar Veículo</button>
<button class="botaoGrande" onclick="abrirTela('dashboard'); atualizarDashboard()">Dashboard</button>
</section>

<!-- NOVA LAVAGEM -->
<section id="novaLavagem" class="tela">
<h2>Registrar Lavagem</h2>
<input id="placa" placeholder="Placa do veículo">
<input id="nome" placeholder="Nome do proprietário">
<input id="telefone" placeholder="Telefone">

<label>Tipo de Veículo</label>
<select id="tipoVeiculo">
<option value="">Selecione</option>
<option value="passeio">Carro passeio</option>
<option value="utilitario">Utilitário</option>
<option value="pickup">Pick-up</option>
<option value="moto">Moto</option>
</select>

<label>Tipo de Lavagem</label>
<select id="tipoLavagem">
<option value="">Selecione</option>
<option value="simples">Simples</option>
<option value="completa">Completa</option>
</select>

<label>Valor</label>
<input id="valor" readonly>

<button onclick="registrarLavagem()">Salvar Lavagem</button>
<button class="voltar" onclick="voltarMenu()">Voltar</button>
</section>

<!-- CONSULTA DE VEÍCULO -->
<section id="consultar" class="tela">
<h2>Consultar Veículo</h2>
<input id="placaConsulta" placeholder="Digite a placa">
<button onclick="consultarVeiculo()">Consultar</button>
<div id="resultadoConsulta"></div>
<button class="voltar" onclick="voltarMenu()">Voltar</button>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="tela">
<h2>Dashboard</h2>

<div id="faturamento">
<h3>Faturamento</h3>
<p>Hoje: R$ <span id="faturamentoHoje">0</span></p>
<p>Últimos 7 dias: R$ <span id="faturamentoSemana">0</span></p>
<p>Mês atual: R$ <span id="faturamentoMes">0</span></p>
</div>

<div id="graficoFaturamento">
<canvas id="chartFaturamento" height="150"></canvas>
</div>

<div id="rankingClientes">
<h3>Clientes Mais Frequentes</h3>
<ul id="listaClientes"></ul>
</div>

<div id="clientesChamar">
<h3>Clientes Para Chamar</h3>
<ul id="listaChamar"></ul>
</div>

<button class="voltar" onclick="voltarMenu()">Voltar</button>
<button onclick="exportarCSV()">Exportar Dados CSV</button>
<button onclick="backupLocal()">Backup JSON</button>
</section>

</main>

<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js')
  .then(reg=>console.log('Service Worker registrado', reg))
  .catch(err=>console.log('Erro SW:', err))
}
</script>

</body>
</html>
